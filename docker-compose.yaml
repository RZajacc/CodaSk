services:
  server:
    build:
      context: ./server
    command: npm run start:dev
    ports:
      - '5000:5000'
    volumes:
      - /usr/src/app/node_modules
      - ./server/src:/usr/src/app/src
    env_file:
      - server/.env

  client:
    build: 
      context: ./client
    ports:
      - '5173:5173'
    volumes:
      - /app/node_modules
      - ./client:/app
    depends_on:
      - server