  backend:
    build:
      context: ./backend-new
    command: npm run start:dev
    ports:
      - '5000:5000'
    volumes:
      - /usr/src/app/node_modules
      - ./backend-new/src:/usr/src/app/src
    env_file:
      - ./backend-new/.env

  frontend-dev:
    build: 
      context: ./client
      target: dev
    ports:
      - '3000:3000'
    volumes:
      - /app/node_modules
      - ./client/src:/app/src
    env_file:
      - ./client/.env.local
    environment:
      - API_URL_SERVER=http://backend-dev:5008
    depends_on:
      - backend