name: Deploy AWS Lambda/ApiGateway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda Function
        uses: aws-actions/aws-lambda-deploy@v1.1.0
        with:
          function-name: codask-api
          code-artifacts-dir: server/dist
          handler: index.handler
          runtime: nodejs22.x

      - name: Create ApiGateway Deployment
        env:
          AWS_API_GATEWAY_API_ID: ${{secrets.AWS_API_GATEWAY_API_ID}}
          AWS_API_GATEWAY_STAGE: ${{secrets.AWS_API_GATEWAY_STAGE}}
        run: |
          aws apigateway create-deployment \
          --rest-api-id $AWS_API_GATEWAY_API_ID \
          --stage-name $AWS_API_GATEWAY_STAGE